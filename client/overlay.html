<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TikTok Battle Royale Overlay</title>
    <link rel="stylesheet" href="/client/styles.css" />
  </head>
  <body>
    <main id="overlayRoot">
      <canvas id="arena" width="1080" height="1920" aria-label="Battle royale arena"></canvas>
      <section id="hud">
        <div id="titleBlock">
          <span class="eyebrow">LIVE BATTLE</span>
          <h1>Spin Royale</h1>
          <p id="statusLine">Join, power up, and unleash ultimates from live webhooks.</p>
        </div>
        <div id="audioControls">
          <div class="audioGroup">
            <button id="musicButton" class="audioToggle is-off" type="button">MUSIC OFF</button>
            <input id="musicVolume" class="volumeSlider" type="range" min="0" max="100" value="100" aria-label="Music volume" />
          </div>
          <div class="audioGroup">
            <button id="sfxButton" class="audioToggle is-off" type="button">SFX OFF</button>
            <input id="sfxVolume" class="volumeSlider" type="range" min="0" max="100" value="35" aria-label="SFX volume" />
          </div>
        </div>
        <div id="leaderboardPanel">
          <h2>Top Gasing</h2>
          <ol id="leaderboard"></ol>
        </div>
      </section>
      <div id="winnerBanner" hidden></div>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/client/src/main.js"></script>
  </body>
</html>
